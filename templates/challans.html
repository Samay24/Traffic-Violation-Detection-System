<!DOCTYPE html>
<html>

<head>

<title>Traffic Challans</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f6f9;
}

.table-container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 4px 10px rgba(0,0,0,0.1);
}

.header{
margin-bottom:20px;
}

.evidence-img{
width:120px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="header">

<h2>🚦 Traffic Challan Records</h2>

<p class="text-muted">
Automatically generated challans from detected violations
</p>

</div>

<div class="table-container">

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Vehicle Number</th>
<th>Violation</th>
<th>Fine</th>
<th>Evidence</th>
<th>PDF Challan</th>
<th>Date</th>

</tr>

</thead>

<tbody>

{% for c in challans %}

<tr>

<td>{{c.id}}</td>

<td>
<span class="badge bg-primary">
{{c.vehicle_number}}
</span>
</td>

<td>
<span class="badge bg-danger">
{{c.violation_type}}
</span>
</td>

<td>
₹{{c.fine_amount}}
</td>

<td>

<img class="evidence-img"
src="{{ url_for('static', filename='evidence/'+c.evidence_file) }}">

</td>

<td>

<a class="btn btn-success btn-sm"
href="{{ url_for('static', filename='challans/'+c.pdf_file) }}"
target="_blank">

Download

</a>

</td>

<td>

{{c.date.strftime("%d-%m-%Y %H:%M")}}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
